name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  skill-validation-linux:
    name: Skill and artifact validation (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ci/playwright/package-lock.json

      - name: Install locked Playwright runtime
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --prefix ci/playwright
          ci/playwright/node_modules/.bin/playwright install --with-deps chromium
          echo "NODE_PATH=$GITHUB_WORKSPACE/ci/playwright/node_modules" >> "$GITHUB_ENV"

      - name: Install coordinator process probes
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends lsof procps
          command -v lsof
          command -v ps

      - name: Run complete non-macOS repository validation
        run: python3 scripts/validate.py --skip-macos-app

      - name: Run disposable PostgreSQL Docker integration
        env:
          POSTGRES_BACKUP_INTEGRATION_IMAGE: postgres:16-alpine
          POSTGRES_BACKUP_INTEGRATION_INVENTORY_CHECKED: "1"
          POSTGRES_BACKUP_INTEGRATION_REQUIRED: "1"
        run: |
          set -euo pipefail
          python3 skills/codex-dev-coordinator/scripts/dev_coordinator.py inventory --project "$GITHUB_WORKSPACE" > "$RUNNER_TEMP/coordinator-inventory.json"
          docker pull "$POSTGRES_BACKUP_INTEGRATION_IMAGE"
          python3 skills/postgres-docker-backup/scripts/integration_test.py

  native-validation-macos:
    name: Native app and full validation (macOS)
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ci/playwright/package-lock.json

      - name: Install locked Playwright runtime
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --prefix ci/playwright
          ci/playwright/node_modules/.bin/playwright install chromium
          echo "NODE_PATH=$GITHUB_WORKSPACE/ci/playwright/node_modules" >> "$GITHUB_ENV"

      - name: Run full repository validation
        run: python3 scripts/validate.py

      - name: Generate and verify isolated native snapshots
        run: |
          set -euo pipefail
          snapshot_dir="$RUNNER_TEMP/devops-board-canonical"
          mkdir -p "$snapshot_dir" .build/qa

          swiftc -parse-as-library \
            -o .build/qa/DevOpsBoardSnapshot \
            apps/DevOpsBoard/Sources/DevOpsBoard/Models.swift \
            apps/DevOpsBoard/Sources/DevOpsBoard/OpsStore.swift \
            apps/DevOpsBoard/Sources/DevOpsBoard/Views.swift \
            apps/DevOpsBoard/Tools/SnapshotProvenance.swift \
            apps/DevOpsBoard/Tools/SnapshotMain.swift

          .build/qa/DevOpsBoardSnapshot "$snapshot_dir/dev-servers.png" servers
          .build/qa/DevOpsBoardSnapshot "$snapshot_dir/docker-board.png" docker
          .build/qa/DevOpsBoardSnapshot "$snapshot_dir/databases.png" databases

          swiftc -parse-as-library \
            -o .build/qa/MenuBarSnapshot \
            apps/DevOpsBoard/Sources/DevOpsBoard/Models.swift \
            apps/DevOpsBoard/Sources/DevOpsBoard/OpsStore.swift \
            apps/DevOpsBoard/Sources/DevOpsBoard/Views.swift \
            apps/DevOpsBoard/Sources/DevOpsBoard/MenuBarViews.swift \
            apps/DevOpsBoard/Tools/SnapshotProvenance.swift \
            apps/DevOpsBoard/Tools/MenuBarSnapshotMain.swift

          .build/qa/MenuBarSnapshot "$snapshot_dir/menu-action-error.png" error
          python3 scripts/verify_snapshot_artifacts.py --directory "$snapshot_dir"
