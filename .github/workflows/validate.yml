name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  six-skill-validation:
    name: Six skills and standalone matrix (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ci/playwright/package-lock.json

      - name: Install locked Playwright runtime
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --prefix ci/playwright
          echo "NODE_PATH=$GITHUB_WORKSPACE/ci/playwright/node_modules" >> "$GITHUB_ENV"

      - name: Install Chromium and Linux browser dependencies
        if: runner.os == 'Linux'
        run: ci/playwright/node_modules/.bin/playwright install --with-deps chromium

      - name: Install Chromium on macOS
        if: runner.os == 'macOS'
        run: ci/playwright/node_modules/.bin/playwright install chromium

      - name: Run complete repository validation
        run: python3 scripts/validate.py
