interface:
  display_name: "Full Repo Audit"
  short_description: "Audit semantic implementation across entire repositories"
  default_prompt: "Use $full-repo-audit for a manifest-verified repo audit. Manually trace every promised feature and public or operational entry point through registration, real calculation/domain logic, data, integrations, permissions, failure/recovery, observable outcomes, lifecycle, and verification—even when no TODO marker exists. Give every distinct responsibility and high-confidence named definition its own source-backed batch_###:C### inventory row. Record an authoritative or source-inferred Basis, parsed or manual Discovery bound to the assigned-unit anchor, and typed test/runtime/source-only evidence with one counterfactual or invariance; source-only evidence cannot close a stateful or external PASS. In the verified lead_reconciliation report, independently reopen every PASS anchor without sampling, map every batch Contract ID exactly once into lead:C### traces, derive lead results from all nine statuses, and preserve every mapped GAP or BLOCKED. Reissue compound findings as atomic findings, then create and fully dispose the exact external projection, including an empty projection for a clean audit. Apply it to CompletionLedger.md only when authorized by an explicit user request or applicable project instruction. Label effort and visual evidence honestly, then return the complete prioritized plan."
