interface:
  display_name: "Full Repo Test Coverage Audit"
  short_description: "Map exact test targets and empirical evidence"
  default_prompt: "Use $full-repo-test-coverage-audit to map every deterministic source target exactly once as TESTED, UNTESTED, or NOT_REASONABLE; validate real test paths and symbols; label evidence EMPIRICAL, STRUCTURAL, MANUAL, or NONE; ingest supplied LCOV/Cobertura/coverage.py/Istanbul artifacts; audit UI journeys and failure paths; and return a prioritized test plan without overstating structural review as runtime coverage."
