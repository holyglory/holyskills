interface:
  display_name: "Trace Fix Root Causes"
  short_description: "Reproduce Codex mistakes and prevent repeats"
  default_prompt: "Use $trace-fix-root-causes when the user reports a Codex implementation mistake, fixed bug, UI flaw, audit miss, or regression. Reproduce the original surface when possible, check whether the requirement changed, trace how Codex perceived the request through requirements, docs, audits, implementation, tests, verifiers, skills, AGENTS.md, and policies, patch the nearest durable guardrail first, audit the testing procedure for other possible missed failures, close the implementation gap, and run the original path, new guardrail, and comprehensive post-fix tests that prove the user gets the expected result. AGENTS.md/policy updates must be generalized reusable rules with explicit scope, not one-off incident explanations. If the issue is general enough to affect Codex behavior across tasks or repos and a global instruction would prevent it, update /Users/holyglory/.codex/AGENTS.md."
