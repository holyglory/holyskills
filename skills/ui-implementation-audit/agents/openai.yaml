interface:
  display_name: "UI Implementation Audit"
  short_description: "Compare UI code, screenshots, and rendered journey usability"
  default_prompt: "Use $ui-implementation-audit to run the read-only manifest-verified UI audit; it batches only interface source files, compares rendered desktop/mobile/native UI against mockups, journey requirements, required UI elements, implementation paths, and test evidence, checks rendered journey usability, readability, visual hierarchy, overload, and blockers, then returns a prioritized implementation plan."
